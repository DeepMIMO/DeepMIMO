<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 490" font-family="Arial,'Helvetica Neue',sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3"
            orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="490" fill="#F9FAFB"/>

  <!-- ═══ PHASE 1: Scene Generation ═══ -->
  <rect x="20" y="15" width="860" height="130" rx="8"
        fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="30" y="38" font-size="12" font-weight="700" fill="#1D4ED8">
    PHASE 1 — Scene Generation
  </text>

  <!-- Step 1 -->
  <rect x="30" y="52" width="250" height="72" rx="5"
        fill="white" stroke="#BFDBFE" stroke-width="1.2"/>
  <text x="155" y="77"  font-size="11"   font-weight="600" fill="#1D4ED8" text-anchor="middle">Step 1</text>
  <text x="155" y="93"  font-size="10.5" fill="#374151"    text-anchor="middle">Scene Extraction</text>
  <text x="155" y="108" font-size="9"    fill="#6B7280"    text-anchor="middle">OSM · LiDAR · CAD</text>

  <line x1="282" y1="88" x2="323" y2="88"
        stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="325" y="52" width="250" height="72" rx="5"
        fill="white" stroke="#BFDBFE" stroke-width="1.2"/>
  <text x="450" y="77"  font-size="11"   font-weight="600" fill="#1D4ED8" text-anchor="middle">Step 2</text>
  <text x="450" y="93"  font-size="10.5" fill="#374151"    text-anchor="middle">Scene Processing</text>
  <text x="450" y="108" font-size="9"    fill="#6B7280"    text-anchor="middle">Geometry · Materials</text>

  <line x1="577" y1="88" x2="618" y2="88"
        stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="620" y="52" width="250" height="72" rx="5"
        fill="white" stroke="#BFDBFE" stroke-width="1.2"/>
  <text x="745" y="77"  font-size="11"   font-weight="600" fill="#1D4ED8" text-anchor="middle">Step 3</text>
  <text x="745" y="93"  font-size="10.5" fill="#374151"    text-anchor="middle">Scene Export</text>
  <text x="745" y="108" font-size="9"    fill="#6B7280"    text-anchor="middle">USD · Mitsuba XML · InSite</text>

  <!-- Phase 1 → 2 connector -->
  <line x1="450" y1="147" x2="450" y2="170"
        stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ PHASE 2: Channel Emulation ═══ -->
  <rect x="20" y="172" width="860" height="162" rx="8"
        fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="30" y="195" font-size="12" font-weight="700" fill="#15803D">
    PHASE 2 — Channel Emulation
  </text>
  <text x="30" y="211" font-size="9.5" fill="#16A34A" font-style="italic">
    DeepMIMO core
  </text>

  <!-- Step 4 -->
  <rect x="50" y="220" width="135" height="90" rx="5"
        fill="white" stroke="#BBF7D0" stroke-width="1.2"/>
  <text x="117" y="254" font-size="11"  font-weight="600" fill="#15803D" text-anchor="middle">Step 4</text>
  <text x="117" y="270" font-size="10"  fill="#374151"    text-anchor="middle">Configure</text>
  <text x="117" y="285" font-size="10"  fill="#374151"    text-anchor="middle">Ray Tracer</text>

  <line x1="187" y1="265" x2="208" y2="265"
        stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5 -->
  <rect x="210" y="220" width="160" height="90" rx="5"
        fill="white" stroke="#BBF7D0" stroke-width="1.2"/>
  <text x="290" y="247" font-size="11"  font-weight="600" fill="#15803D" text-anchor="middle">Step 5</text>
  <text x="290" y="263" font-size="10"  fill="#374151"    text-anchor="middle">Run Ray Tracer</text>
  <text x="290" y="277" font-size="8.5" fill="#6B7280"    text-anchor="middle">AODT · Sionna RT</text>
  <text x="290" y="290" font-size="8.5" fill="#6B7280"    text-anchor="middle">Wireless InSite</text>

  <line x1="372" y1="265" x2="393" y2="265"
        stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 6 -->
  <rect x="395" y="220" width="135" height="90" rx="5"
        fill="white" stroke="#BBF7D0" stroke-width="1.2"/>
  <text x="462" y="254" font-size="11" font-weight="600" fill="#15803D" text-anchor="middle">Step 6</text>
  <text x="462" y="270" font-size="10" fill="#374151"    text-anchor="middle">Convert</text>
  <text x="462" y="285" font-size="10" fill="#374151"    text-anchor="middle">Outputs</text>

  <line x1="532" y1="265" x2="553" y2="265"
        stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 7 -->
  <rect x="555" y="220" width="135" height="90" rx="5"
        fill="white" stroke="#BBF7D0" stroke-width="1.2"/>
  <text x="622" y="254" font-size="11" font-weight="600" fill="#15803D" text-anchor="middle">Step 7</text>
  <text x="622" y="270" font-size="10" fill="#374151"    text-anchor="middle">Compute</text>
  <text x="622" y="285" font-size="10" fill="#374151"    text-anchor="middle">Channels</text>

  <line x1="692" y1="265" x2="713" y2="265"
        stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 8 -->
  <rect x="715" y="220" width="135" height="90" rx="5"
        fill="white" stroke="#BBF7D0" stroke-width="1.2"/>
  <text x="782" y="254" font-size="11" font-weight="600" fill="#15803D" text-anchor="middle">Step 8</text>
  <text x="782" y="270" font-size="10" fill="#374151"    text-anchor="middle">Export</text>
  <text x="782" y="285" font-size="10" fill="#374151"    text-anchor="middle">Channels</text>

  <!-- Phase 2 → 3 connector -->
  <line x1="450" y1="336" x2="450" y2="357"
        stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ PHASE 3: Downstream Simulation ═══ -->
  <rect x="20" y="360" width="860" height="120" rx="8"
        fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="30" y="383" font-size="12" font-weight="700" fill="#92400E">
    PHASE 3 — Downstream Simulation
  </text>

  <!-- Step 9 -->
  <rect x="85" y="393" width="350" height="72" rx="5"
        fill="white" stroke="#FDE68A" stroke-width="1.2"/>
  <text x="260" y="420" font-size="11"   font-weight="600" fill="#92400E" text-anchor="middle">Step 9</text>
  <text x="260" y="437" font-size="10.5" fill="#374151"    text-anchor="middle">Run Simulation</text>
  <text x="260" y="452" font-size="9"    fill="#6B7280"    text-anchor="middle">5G NR · Beamforming · AI/ML</text>

  <line x1="437" y1="429" x2="463" y2="429"
        stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 10 -->
  <rect x="465" y="393" width="350" height="72" rx="5"
        fill="white" stroke="#FDE68A" stroke-width="1.2"/>
  <text x="640" y="420" font-size="11"   font-weight="600" fill="#92400E" text-anchor="middle">Step 10</text>
  <text x="640" y="437" font-size="10.5" fill="#374151"    text-anchor="middle">Collect &amp; Store Data</text>
  <text x="640" y="452" font-size="9"    fill="#6B7280"    text-anchor="middle">BLER · capacity · prediction error</text>
</svg>
